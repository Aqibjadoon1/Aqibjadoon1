<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="auto">
  <defs>
    <linearGradient id="headingGrad" x1="0%" y1="0%" x2="300%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="33%" stop-color="#8B5CF6"/>
      <stop offset="66%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
      <animate attributeName="x1" values="0%;-200%;0%" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="300%;100%;300%" dur="5s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="#ffffff" rx="16" stroke="#e5e7eb" stroke-width="1"/>
  <text x="400" y="85" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="44" font-weight="800" fill="url(#headingGrad)" letter-spacing="1">Aqib Jadoon</text>
  <line x1="280" y1="105" x2="520" y2="105" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
  <text x="400" y="140" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" fill="#7C3AED" opacity="0">
    CS Student · Front-End Developer · React Enthusiast
    <animate attributeName="opacity" values="0;1;1" dur="2s" begin="1s" fill="freeze"/>
  </text>
  <text x="400" y="170" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" fill="#9CA3AF" opacity="0">
    Building things for the web, one component at a time
    <animate attributeName="opacity" values="0;1;1" dur="2s" begin="2s" fill="freeze"/>
  </text>
</svg>
