name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
          color_snake: "#8B5CF6"

      - uses: actions/checkout@v4
        with:
          ref: output
          path: out

      - run: |
          cp dist/snake.svg out/snake.svg
          cp dist/snake-dark.svg out/snake-dark.svg
          cd out
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --quiet --staged; then
            git commit -m "Update snake SVGs [skip ci]"
            git push origin output
          fi
