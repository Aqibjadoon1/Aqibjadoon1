# WakaTime Weekly Coding Stats Workflow
#
# SETUP REQUIRED — before this workflow will populate the ⏱️ Weekly Coding Activity section:
#
#   1. Create a free WakaTime account at https://wakatime.com
#   2. Install the WakaTime plugin for your IDE (VS Code, JetBrains, etc.)
#      → VS Code: search "WakaTime" in the Extensions marketplace
#   3. Copy your secret API key from https://wakatime.com/settings/api-key
#   4. In your GitHub profile repo (Aqibjadoon1/Aqibjadoon1):
#      Settings → Secrets and variables → Actions → New repository secret
#      Name:  WAKATIME_API_KEY
#      Value: <your key from step 3>
#
# Once the secret is set, this workflow runs automatically every 24 hours
# and replaces the <!--START_SECTION:waka--> ... <!--END_SECTION:waka--> block
# in README.md with your real coding stats.

name: WakaTime Readme Stats

on:
  schedule:
    # Runs every 24 hours at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  update-readme:
    name: Update README with WakaTime stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update WakaTime stats in README
        uses: anmol098/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Display options — customise as you like
          SHOW_OS: "True"
          SHOW_PROJECTS: "True"
          SHOW_EDITORS: "True"
          SHOW_LANGUAGE: "True"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_SHORT_INFO: "True"
          SHOW_LINES_OF_CODE: "True"
          SHOW_DAYS_OF_WEEK: "True"
          SHOW_TIMEZONE: "True"
          SHOW_COMMIT: "True"
          COMMIT_BY_ME: "True"
